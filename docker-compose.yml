services:
  postgres:
    image: postgres:16
    container_name: secure-mail-postgres
    environment:
      POSTGRES_DB: secure_mail_db
      POSTGRES_USER: securemail
      POSTGRES_PASSWORD: securemail123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
