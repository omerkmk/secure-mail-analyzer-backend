# Secret = hassas bilgiler (şifre, kullanıcı adı)
# Compose'daki environment: POSTGRES_USER, POSTGRES_PASSWORD vb.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_DB: secure_mail_db
  POSTGRES_USER: securemail
  POSTGRES_PASSWORD: securemail123
  # Backend de aynı secret'ı kullanacak
  SPRING_DATASOURCE_USERNAME: securemail
  SPRING_DATASOURCE_PASSWORD: securemail123
